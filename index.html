<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f1115" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-192.png" type="image/png" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
  <title>القرآن والتفسير</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell" id="appShell">
    <aside class="sidebar" id="surahSidebar" aria-label="قائمة السور">
      <nav class="drawer-nav" aria-label="قائمة التطبيق">
        <button class="btn drawer-nav-btn" data-view="homeView">الرئيسية</button>
        <button class="btn drawer-nav-btn" data-view="searchView">البحث</button>
        <button class="btn drawer-nav-btn" data-view="bookmarksView">إشاراتي</button>
        <button class="btn drawer-nav-btn" data-view="settingsView">الإعدادات</button>
        <button class="btn drawer-nav-btn drawer-nav-btn-tasbih" data-href="azkar.html" aria-label="فتح المسبحة">
          <span class="material-symbols-rounded" aria-hidden="true">spa</span>
          <span>المسبحة</span>
        </button>
      </nav>
      <div class="brand">
        <h1>القرآن والتفسير</h1>
        <p>قراءة وتفسير بدون إنترنت</p>
      </div>
      <label class="sidebar-search-label" for="surahSearch">بحث السور</label>
      <input id="surahSearch" type="search" placeholder="ابحث باسم السورة..." />
      <ul id="surahList" class="surah-list"></ul>
    </aside>

    <main class="main-content">
      <button id="mobileMenuBtn" class="mobile-clean-menu" aria-label="فتح القائمة" aria-expanded="false">⋮</button>
      <header class="topbar">
        <button id="toggleSidebar" class="btn" aria-label="إظهار أو إخفاء السور" aria-expanded="false">السور</button>
        <div class="topbar-title">
          <h2 id="currentTitle">سورة الفاتحة</h2>
          <p id="currentMeta">آية 1</p>
        </div>
        <div class="topbar-actions">
          <button id="modeToggle" class="btn">المسبحة</button>
          <button id="bookmarkToggle" class="icon-btn" aria-label="إشارة مرجعية">★</button>
        </div>
      </header>

      <section id="homeView" class="view active">
        <div class="mushaf-page-shell">
          <div id="reader" class="reader mushaf-page" tabindex="0" aria-label="قارئ القرآن"></div>
        </div>
        <div id="pageNumberBadge" class="page-number-badge"></div>
        <section id="pageTafsirSection" class="page-tafsir-section">
          <h4> ملخص التفسير الميسر للصفحة بالذكاء الاصطناعي </h4>
          <div id="pageTafsir" class="tafsir-box"></div>
        </section>
        <div class="reader-controls">
          <button id="prevBtn" class="btn">السابق</button>
          <input id="pageInput" class="page-jump-input" type="number" min="1" max="604" placeholder="رقم الصفحة" />
          <button id="jumpBtn" class="btn">اذهب</button>
          <button id="nextBtn" class="btn">التالي</button>
          <button id="savePositionBtn" class="btn">حفظ الصفحة</button>
          <button id="audioBtn" class="btn">تشغيل الصوت</button>
        </div>
      </section>

      <section id="searchView" class="view">
        <h3>البحث في القرآن</h3>
        <input id="textSearch" type="search" placeholder="اكتب كلمة أو جزء آية..." />
        <ul id="searchResults" class="result-list"></ul>
      </section>

      <section id="bookmarksView" class="view">
        <h3>الإشارات المرجعية</h3>
        <ul id="bookmarksList" class="result-list"></ul>
      </section>

      <section id="settingsView" class="view">
        <h3>الإعدادات</h3>
        <div class="settings-grid">
          <label class="setting-item">
            <span class="setting-label">اللون</span>
            <select id="themeSelect">
              <option value="dark-gold">ذهبي</option>
              <option value="white">أبيض</option>
            </select>
          </label>
          <label class="setting-item">
            <span class="setting-label">القارئ</span>
            <select id="reciterSelect">
              <option value="ar.alafasy">العفاسي</option>
              <option value="ar.husary">الحصري</option>
            </select>
          </label>
        </div>
      </section>
    </main>
  </div>

  <a id="tasbihFab" class="tasbih-fab mobile-only" href="azkar.html" aria-label="فتح المسبحة">م</a>

  <nav class="mobile-bottom-nav" id="mobileBottomNav" aria-label="شريط تنقل الهاتف">
    <button id="mobileMoreBtn" class="mobile-bottom-btn" type="button" aria-label="فتح القائمة">
      <span class="material-symbols-rounded" aria-hidden="true">more_vert</span>
    </button>
    <button id="mobileBookmarkBtn" class="mobile-bottom-btn" type="button" aria-label="حفظ الصفحة" aria-pressed="false">
      <span id="mobileBookmarkIcon" class="material-symbols-rounded" aria-hidden="true">bookmark_border</span>
    </button>
    <button id="mobileAudioBtn" class="mobile-bottom-btn" type="button" aria-label="تشغيل الصوت" aria-pressed="false">
      <span id="mobileAudioIcon" class="material-symbols-rounded" aria-hidden="true">play_arrow</span>
    </button>
    <button id="mobileJumpBtn" class="mobile-bottom-btn" type="button" aria-label="الانتقال إلى صفحة">
      <span class="material-symbols-rounded" aria-hidden="true">find_in_page</span>
    </button>
  </nav>

  <nav class="mobile-page-nav" id="mobilePageNav" aria-label="التنقل بين الصفحات">
    <button id="mobilePrevBtn" class="mobile-page-btn" type="button">← السابق</button>
    <button id="mobileNextBtn" class="mobile-page-btn" type="button">التالي →</button>
  </nav>

  <div id="mobileJumpPanel" class="mobile-jump-panel" hidden>
    <input id="mobileJumpInput" class="mobile-jump-input" type="number" min="1" max="604" inputmode="numeric" placeholder="رقم الصفحة" aria-label="رقم الصفحة" />
    <button id="mobileJumpGoBtn" class="btn" type="button">اذهب</button>
  </div>

  <nav class="mobile-nav mobile-only">
    <button data-view="homeView" class="active">الرئيسية</button>
    <button data-view="searchView">البحث</button>
    <button data-href="azkar.html">المسبحة</button>
    <button data-view="bookmarksView">إشاراتي</button>
    <button data-view="settingsView">الإعدادات</button>
  </nav>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {
          // Ignore registration failures in unsupported contexts.
        });
      });
    }
  </script>
  <script src="app.js" type="module"></script>
</body>
</html>
